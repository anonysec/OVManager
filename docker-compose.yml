# OVManager stack - Docker deployment built from source repos.
# Port map (host:container):
#   panel  HTTP 2095
#   node   HTTP 2083
#
# Data is persisted on the host at /opt/ovmanager/data and /opt/ovnode/data
# (existing live data is reused, not overwritten).
networks:
  ovnet:
    driver: bridge

volumes:
  ovnode-pki:
  ovnode2-pki:

services:
  ovmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovmanager
    ports:
      - "2095:2095"
    environment:
      - PORT=2095
      - HOST=0.0.0.0
      - PUBLIC_URL=http://91.107.164.180:2095
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2095/health', timeout=3); print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /opt/ovmanager/data:/app/data
      - ./.env:/app/.env:ro
    networks:
      - ovnet
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  ovnode:
    build:
      context: ./OVNode
      dockerfile: Dockerfile
    container_name: ovnode
    ports:
      - "2083:2083"
      - "1194:1194/udp"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2083/sync/health', timeout=3); print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    privileged: false
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
      - /var/run
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - SERVICE_PORT=2083
    volumes:
      - /opt/ovnode/data:/app/data
      - ./OVNode/.env:/app/.env:ro
      - /dev/net/tun:/dev/net/tun
      - ovnode-pki:/etc/openvpn/server/pki
    networks:
      - ovnet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  ovnode2:
    build:
      context: ./OVNode2
      dockerfile: Dockerfile
    container_name: ovnode2
    ports:
      - "2084:2084"
      - "1195:1195/udp"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2084/sync/health', timeout=3); print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    privileged: false
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
      - /var/run
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - SERVICE_PORT=2084
      - OPENVPN_PORT=1195
    volumes:
      - /opt/ovnode2/data:/app/data
      - ./OVNode2/.env:/app/.env:ro
      - /dev/net/tun:/dev/net/tun
      - ovnode2-pki:/etc/openvpn/server/pki
    networks:
      - ovnet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'